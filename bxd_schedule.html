<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BxD ローテーション管理</title>
<style>
:root{
  --green:#1a9e6e;--green-dark:#0e6b49;--green-light:#e6f7f1;--green-mid:#9fe1cb;
  --purple:#534ab7;--purple-light:#eeedfe;
  --amber:#ba7517;--amber-light:#faeeda;
  --red:#c0392b;--red-light:#fdecea;
  --gray1:#f7f7f6;--gray2:#eeede9;--gray3:#c8c7c1;--gray4:#888780;
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --border:rgba(0,0,0,0.1);--radius:10px;--radius-sm:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:var(--gray1);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}
.topbar{background:var(--green-dark);color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:600;letter-spacing:.03em}
.topbar p{font-size:11px;opacity:.7;margin-top:1px}
.tabbar{display:flex;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99;overflow-x:auto}
.tabbar button{flex:1;min-width:60px;padding:11px 4px 10px;border:none;background:transparent;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap}
.tabbar button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.page{display:none !important;padding:14px 14px 80px;max-width:520px;margin:0 auto}
.page.active{display:block !important}
.card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.icon{width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.ig{background:var(--green-light);color:var(--green-dark)}
.ip{background:var(--purple-light);color:var(--purple)}
.ia{background:var(--amber-light);color:var(--amber)}
input[type=text],input[type=date],textarea,select{
  width:100%;padding:9px 11px;border:1px solid var(--gray3);border-radius:var(--radius-sm);
  font-size:14px;font-family:inherit;background:#fff;color:var(--text);
  -webkit-appearance:none;appearance:none;outline:none}
input:focus,textarea:focus,select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(26,158,110,.12)}
textarea{resize:vertical;line-height:1.6}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:transform .1s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-secondary{background:var(--gray2);color:var(--text)}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.rank{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;white-space:nowrap}
.rank-R5{background:#fff3cd;color:#856404}
.rank-R4{background:var(--purple-light);color:var(--purple)}
.rank-R3{background:var(--green-light);color:var(--green-dark)}
.rank-R2{background:#fdecea;color:#a32d2d}
.rank-R1{background:var(--gray2);color:var(--gray4)}
.filter-row{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border:1px solid var(--gray3);border-radius:20px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit;color:var(--text2)}
.filter-btn.active{border-color:var(--green);color:var(--green);background:var(--green-light);font-weight:600}
.day-row{display:grid;grid-template-columns:52px minmax(0,1fr) minmax(0,1fr);gap:6px;align-items:center;margin-bottom:8px}
.day-label{font-size:11px;font-weight:700;text-align:center;padding:6px 2px;border-radius:var(--radius-sm);line-height:1.4}
.d0{background:#e8f4ff;color:#1a5fa8}
.d1,.d2,.d3,.d4{background:var(--gray2);color:var(--text2)}
.d5{background:#eef4ff;color:#3355aa}
.d6{background:#ffeef0;color:#aa2233}
.name-wrap{position:relative}
.ni{width:100%;padding:7px 8px;border:1px solid var(--gray3);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;background:#fff;color:var(--text)}
.ni:focus{border-color:var(--green);outline:none}
.ni.af{border-color:var(--green-mid);background:var(--green-light)}
.dropdown{position:absolute;top:calc(100% + 2px);left:0;right:0;background:#fff;border:1px solid var(--gray3);border-radius:var(--radius-sm);max-height:180px;overflow-y:auto;z-index:200;box-shadow:0 4px 12px rgba(0,0,0,.1);display:none}
.dropdown.open{display:block}
.di{padding:7px 10px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--gray2);display:flex;align-items:center;gap:6px}
.di:last-child{border-bottom:none}
.di:hover{background:var(--green-light)}
.prev-wrap{background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;margin-bottom:12px}
.prev-head{background:var(--green-dark);color:#fff;padding:12px 16px}
.prev-head h2{font-size:15px;font-weight:700}
.prev-head p{font-size:11px;opacity:.8;margin-top:2px}
.pt{width:100%;border-collapse:collapse}
.pt th{background:var(--green-light);color:var(--green-dark);font-size:11px;font-weight:700;padding:7px 10px;text-align:left;border-bottom:1px solid var(--green-mid)}
.pt td{padding:9px 10px;border-bottom:1px solid var(--gray2);font-size:13px}
.pt tr:last-child td{border-bottom:none}
.pt .dc{font-weight:700;font-size:11px;color:var(--text2);width:50px}
.pt .cc{color:var(--green-dark);font-weight:600}
.pt .vc{color:var(--purple);font-weight:600}
.pt .ec{color:var(--text3);font-style:italic}
.prev-foot{padding:6px 12px;font-size:10px;color:var(--text3);text-align:right;border-top:1px solid var(--gray2)}
.hi{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray2)}
.hi:last-child{border-bottom:none}
.hw{font-size:13px;font-weight:600}
.hs{font-size:11px;color:var(--text3);margin-top:1px}
.rot-ind{background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;color:var(--green-dark);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.wn{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.wn-btn{background:var(--gray2);border:none;border-radius:var(--radius-sm);width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text)}
.wn-lbl{flex:1;text-align:center;font-size:14px;font-weight:600}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;border-radius:20px;padding:9px 20px;font-size:13px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:28px 16px;color:var(--text3);font-size:13px;border:1px dashed var(--gray3);border-radius:var(--radius)}

/* ── HELP OVERLAY ── */
.help-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:500;display:none}
.help-overlay.open{display:block}
.help-bubble{position:absolute;top:110px;left:12px;right:12px;background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.15);padding:14px 16px;font-size:13px;line-height:1.7;max-height:70vh;overflow-y:auto}
.help-bubble h3{font-size:13px;font-weight:700;color:var(--green-dark);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.help-bubble li{margin-left:16px;margin-bottom:4px;color:var(--text2)}
.help-bubble .warn{background:var(--amber-light);border-radius:var(--radius-sm);padding:6px 10px;font-size:12px;color:var(--amber);margin-top:8px}
.help-btn{position:fixed;z-index:501;bottom:20px;right:16px;width:38px;height:38px;border-radius:50%;background:var(--green);color:#fff;border:none;font-size:18px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.2);display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div class="topbar">
  <h1>🚂 BxD ローテーション管理</h1>
  <p>Zone 720 — Last War <span id="sync-status" style="margin-left:8px;font-size:10px;opacity:0;transition:opacity .3s"></span></p>
</div>
<div class="tabbar">
  <button onclick="showPage('schedule')" id="tab-schedule" class="active">スケジュール</button>
  <button onclick="showPage('preview')" id="tab-preview">案内表示</button>
  <button onclick="showPage('history')" id="tab-history">履歴</button>
  <button onclick="showPage('admin')" id="tab-admin">管理者</button>
</div>
<div id="toast"></div>

<!-- スケジュール -->
<div class="page active" id="page-schedule">
  <div class="card">
    <div class="card-title"><span class="icon ig">📅</span>週の設定</div>
    <label>週の開始日（月曜日）</label>
    <input type="date" id="sched-week-start">
    <div class="btn-row">
<button class="btn btn-secondary btn-sm" onclick="setNextMonday()">来週</button>
      <button class="btn btn-primary btn-sm" onclick="autoFill()">🔄 自動入力</button>
      <button class="btn btn-secondary btn-sm" onclick="clearDayRows()">🗑 クリア</button>
    </div>
  </div>
  <div id="rot-status"></div>
  <div class="card">
    <div class="card-title"><span class="icon ig">✍️</span>各日の担当 <span style="font-size:11px;color:var(--text3);font-weight:400;margin-left:4px">名前検索で上書き可</span></div>
    <div id="days-container"></div>
  </div>
  <div class="card">
    <button class="btn btn-primary" onclick="saveSchedule()" style="width:100%">💾 保存して案内表示へ</button>
  </div>
</div>

<!-- 案内表示 -->
<div class="page" id="page-preview">
  <div class="wn">
    <button class="wn-btn" onclick="chgPrev(-1)">‹</button>
    <span class="wn-lbl" id="prev-lbl">—</span>
    <button class="wn-btn" onclick="chgPrev(1)">›</button>
  </div>
  <div id="preview-area"><div class="empty">スケジュールがありません</div></div>
  <p style="font-size:11px;color:var(--text3);text-align:center;margin-top:8px">この画面をスクショして連盟チャットへ共有</p>
</div>

<!-- 履歴 -->
<div class="page" id="page-history">
  <div class="card">
    <div class="card-title"><span class="icon ip">📋</span>スケジュール履歴</div>
    <div id="history-list"><div class="empty">履歴がありません</div></div>
  </div>
  <div id="history-detail"></div>
</div>

<!-- 管理者 -->
<div class="page" id="page-admin">
  <div class="card">
    <div class="card-title"><span class="icon ig">👥</span>連盟員リスト <span id="admin-member-count" style="font-size:11px;color:var(--text3);font-weight:400;margin-left:4px"></span></div>
    <div class="btn-row" style="margin-bottom:8px;margin-top:0">
      <button class="btn btn-secondary btn-sm" onclick="sortMembersByRank()">ランク順に並べ替え（R5→R1）</button>
    </div>
    <div class="filter-row" id="admin-rank-filter">
      <button class="filter-btn active" data-rank="all" onclick="setAdminFilter('all')">全員</button>
      <button class="filter-btn" data-rank="R5" onclick="setAdminFilter('R5')">R5</button>
      <button class="filter-btn" data-rank="R4" onclick="setAdminFilter('R4')">R4</button>
      <button class="filter-btn" data-rank="R3" onclick="setAdminFilter('R3')">R3</button>
      <button class="filter-btn" data-rank="R2" onclick="setAdminFilter('R2')">R2</button>
      <button class="filter-btn" data-rank="R1" onclick="setAdminFilter('R1')">R1</button>
    </div>
    <div id="admin-member-list"></div>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon ig">➕</span>1名手動追加</div>
    <div style="display:flex;gap:8px;align-items:flex-end">
      <div style="flex:1"><label>名前</label><input type="text" id="add-name" placeholder="プレイヤー名"></div>
      <div style="width:80px"><label>ランク</label>
        <select id="add-rank"><option>R5</option><option>R4</option><option selected>R3</option><option>R2</option><option>R1</option></select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="addOne()" style="margin-bottom:1px">追加</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title"><span class="icon ip">📋</span>車掌メモから一括インポート</div>
    <p style="font-size:12px;color:var(--text3);margin-bottom:8px">毎月のメモをそのまま貼り付けてください。複数月まとめてもOKです。</p>
    <div style="background:var(--gray1);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;color:var(--text2);margin-bottom:8px;border:1px solid var(--gray2)">
      例：６月度車掌<br>１日　1000まん<br>２日　ながらブン
    </div>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <label style="margin:0;white-space:nowrap">月が不明な場合：</label>
      <select id="memo-fallback-month" style="width:100px;padding:6px 8px;font-size:13px">
        <option value="">自動判定</option>
        <option value="1">1月</option><option value="2">2月</option><option value="3">3月</option>
        <option value="4">4月</option><option value="5">5月</option><option value="6">6月</option>
        <option value="7">7月</option><option value="8">8月</option><option value="9">9月</option>
        <option value="10">10月</option><option value="11">11月</option><option value="12">12月</option>
      </select>
    </div>
    <textarea id="memo-input" rows="7" placeholder="ここにメモを貼り付け"></textarea>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="importMemo()">📥 インポート</button>
      <button class="btn btn-secondary" onclick="document.getElementById('memo-input').value=''">クリア</button>
    </div>
    <div id="memo-result" style="margin-top:8px;font-size:12px"></div>
  </div>
</div>

<script>
const DAYS = ['月','火','水','木','金','土','日'];
const DCLS = ['d0','d1','d2','d3','d4','d5','d6'];
const SKEY = 'bxd_rot_v3';
const RANK_ORDER = {R5:0, R4:1, R3:2, R2:3, R1:4};

// ── GAS Backend URL ── (GASデプロイ後にここを更新)
const GAS_URL = 'YOUR_GAS_URL_HERE';

const DEFAULT_MEMBERS = [
  {name:"イツキ ヨウ",rank:"R5"},
  {name:"chokurin",rank:"R4"},{name:"Chokurin",rank:"R4"},{name:"あちょりん",rank:"R4"},
  {name:"カニカフ",rank:"R4"},{name:"ネコマ",rank:"R4"},{name:"ネ申",rank:"R4"},
  {name:"焼きししとう",rank:"R4"},{name:"遊蓮ダイヤ",rank:"R4"},{name:"まのちぃ",rank:"R4"},
  {name:"ひろすね",rank:"R4"},
  {name:"-MOLO-",rank:"R3"},{name:"1000まん",rank:"R3"},{name:"DELICA D5",rank:"R3"},
  {name:"kazu202407",rank:"R3"},{name:"kuma71",rank:"R3"},{name:"MASAわん",rank:"R3"},
  {name:"Mm165070",rank:"R3"},{name:"nameしん",rank:"R3"},{name:"Rosso Giallo",rank:"R3"},
  {name:"S KEN KEN",rank:"R3"},{name:"sinOn",rank:"R3"},{name:"あいさい3",rank:"R3"},
  {name:"おさるらい",rank:"R3"},{name:"オペラ2",rank:"R3"},{name:"オムギ",rank:"R3"},
  {name:"おやっ",rank:"R3"},{name:"かきのすけ",rank:"R3"},{name:"がづびご",rank:"R3"},
  {name:"ケージロー",rank:"R3"},{name:"サイレーン",rank:"R3"},{name:"さくらいづみ",rank:"R3"},
  {name:"シーカーTA",rank:"R3"},{name:"しちゅうちょ",rank:"R3"},{name:"じゅっきーに",rank:"R3"},
  {name:"タイムライン",rank:"R3"},{name:"たちこぎ",rank:"R3"},{name:"ちぷ組長",rank:"R3"},
  {name:"ディンプル",rank:"R3"},{name:"トリかもね",rank:"R3"},{name:"ながらブン",rank:"R3"},
  {name:"ぱぐのしっぽ",rank:"R3"},{name:"ハトのちち",rank:"R3"},{name:"ババゴン",rank:"R3"},
  {name:"ばんちょう0",rank:"R3"},{name:"ピーヤだ丼",rank:"R3"},{name:"ぺこちゃま",rank:"R3"},
  {name:"まーびす",rank:"R3"},{name:"ムサシコスギ",rank:"R3"},{name:"ムズメン",rank:"R3"},
  {name:"もずっく502",rank:"R3"},{name:"ものぐささん",rank:"R3"},{name:"りなぶー",rank:"R3"},
  {name:"リリィ17",rank:"R3"},{name:"牡蠣ピーヤ",rank:"R3"},{name:"魚魚太",rank:"R3"},
  {name:"兄まさ",rank:"R3"},{name:"高アキ",rank:"R3"},{name:"黒煙隊教戒",rank:"R3"},
  {name:"社内恋愛可能",rank:"R3"},{name:"小将軍WZ",rank:"R3"},{name:"瑞桜",rank:"R3"},
  {name:"赤クラ",rank:"R3"},{name:"雪の介",rank:"R3"},{name:"父ピーヤ",rank:"R3"},
  {name:"母ピーヤ",rank:"R3"},{name:"ヌシのjun",rank:"R3"},{name:"野村半導体",rank:"R3"},
  {name:"老眼戦士秀G",rank:"R3"},{name:"麒麟くん",rank:"R3"},
  {name:"サガMAX",rank:"R1"},{name:"ムサコのコ",rank:"R1"},{name:"ネ甲",rank:"R1"},
  {name:"海辺ねねこ",rank:"R1"},{name:"椋0422",rank:"R3"},{name:"Pepocoくん〆",rank:"R1"},
  {name:"カ二カフ",rank:"R3"},{name:"u3たんく666",rank:"R3"},{name:"天ｲ吏の子",rank:"R3"},
  {name:"モブさーん",rank:"R3"},{name:"さやちんまる",rank:"R3"}
];

let S = loadS();
let adminRankFilter = 'all';
let editingName = null;


// ── GAS sync ──────────────────────────────────────────────────
async function syncFromGAS() {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return;
  try {
    showSyncStatus('⏳ 同期中...');
    const res = await fetch(GAS_URL + '?action=load', {
      redirect: 'follow',
      muteHttpExceptions: true
    });
    const data = await res.json();
    if (data.error) { showSyncStatus('⚠️ 同期エラー'); return; }
    if (data.members)          S.members          = data.members;
    if (data.schedules)        S.schedules        = data.schedules;
    if (data.conductorHistory) S.conductorHistory = data.conductorHistory;
    if (data.excluded)         S.excluded         = data.excluded;
    localStorage.setItem(SKEY, JSON.stringify(S));
    showSyncStatus('✓ 同期済み');
    renderAdminList();
    renderHistory();
    renderPreview();
    updateRotStatus();
    buildDayRows();
    loadExistingSchedule();
  } catch(e) {
    showSyncStatus('⚠️ 同期失敗（オフライン？）');
  }
}

async function saveToGAS() {
  if (!GAS_URL || GAS_URL === 'YOUR_GAS_URL_HERE') return;
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action: 'save',
        payload: {
          members: S.members,
          schedules: S.schedules,
          conductorHistory: S.conductorHistory,
          excluded: S.excluded
        }
      })
    });
  } catch(e) {
    console.warn('GAS save failed:', e);
  }
}

function showSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) { el.textContent = msg; el.style.opacity = '1'; }
  setTimeout(() => { if (el) el.style.opacity = '0'; }, 3000);
}

function loadS() {
  try {
    const r = localStorage.getItem(SKEY);
    if (r) {
      const d = JSON.parse(r);
      if (!d.conductorHistory) d.conductorHistory = {};
      if (!d.excluded) d.excluded = {};
      return d;
    }
  } catch(e) {}
  const def = [...DEFAULT_MEMBERS].sort((a,b)=>{
    const ra=RANK_ORDER[a.rank]??9, rb=RANK_ORDER[b.rank]??9;
    return ra!==rb ? ra-rb : a.name.localeCompare(b.name,'ja');
  });
  return { members: def, rotPos: 0, schedules: {}, previewIdx: 0, conductorHistory: {}, excluded: {} };
}
function save() { try { localStorage.setItem(SKEY, JSON.stringify(S)); } catch(e) {} saveToGAS(); }

// ── utils ──
function monOf(s) { const d = new Date(s+'T00:00:00'); const dw = d.getDay(); d.setDate(d.getDate()+(dw===0?1:1-dw)); return d; }
// For getting the week-key of a Sunday (belongs to the PREVIOUS week's Mon-Sun)
function weekMonOf(s) { const d = new Date(s+'T00:00:00'); const dw = d.getDay(); d.setDate(d.getDate()+(dw===0?-6:1-dw)); return d; }
function iso(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function fd(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function todayISO() { return iso(new Date()); }

function toast(m) {
  const el = document.getElementById('toast');
  el.textContent = m; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

function showPage(n) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tabbar button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if (n === 'preview') renderPreview();
  if (n === 'history') renderHistory();
  if (n === 'admin') renderAdminList();
}

// ── schedule ──
function setNextMonday() {
  autoSaveCurrentWeek(() => {
    const thisMonday = monOf(todayISO());
    const next = new Date(thisMonday);
    next.setDate(thisMonday.getDate() + 7);
    document.getElementById('sched-week-start').value = iso(next);
    buildDayRows();
    loadExistingSchedule();
    updateRotStatus();
  });
}

function autoSaveCurrentWeek(callback) {
  const ws = document.getElementById('sched-week-start').value;
  if (!ws) { callback(); return; }
  const mon = monOf(ws); const key = iso(mon);
  // Check if any input has content
  let hasContent = false;
  for (let i = 0; i < 7; i++) {
    const c = document.getElementById('c_'+i)?.value.trim();
    const v = document.getElementById('v_'+i)?.value.trim();
    if (c || v) { hasContent = true; break; }
  }
  if (!hasContent) { callback(); return; }
  // Auto-save silently
  const days = [];
  for (let i = 0; i < 7; i++) {
    const c = document.getElementById('c_'+i)?.value.trim()||'';
    const v = document.getElementById('v_'+i)?.value.trim()||'';
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    days.push({ day: DAYS[i], date: fd(d), conductor: c, vip: v });
  }
  S.schedules[key] = days;
  S.previewIdx = Object.keys(S.schedules).sort().indexOf(key);
  save();
  toast('入力内容を自動保存しました ✓');
  callback();
}

function buildDayRows() {
  const ws = document.getElementById('sched-week-start').value;
  if (!ws) return;
  const mon = monOf(ws);
  const container = document.getElementById('days-container');
  container.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    const row = document.createElement('div'); row.className = 'day-row';
    const lbl = document.createElement('div'); lbl.className = 'day-label '+DCLS[i];
    lbl.innerHTML = `${fd(d)}<br>${DAYS[i]}`;
    row.appendChild(lbl);
    row.appendChild(makeNW('c_'+i, i, 'conductor'));
    row.appendChild(makeNW('v_'+i, i, 'vip'));
    container.appendChild(row);
  }
  // Pre-fill Monday VIP from previous week's Sunday conductor
  // (Done after loop so DOM elements exist)
  const prevSunday = new Date(mon); prevSunday.setDate(mon.getDate() - 1);
  const prevSundayStr = iso(prevSunday);
  const prevWeekKey = iso(weekMonOf(prevSundayStr));
  const prevSchedule = S.schedules[prevWeekKey];
  let prevSunConductorBD = '';
  if (prevSchedule && prevSchedule[6]?.conductor) {
    prevSunConductorBD = prevSchedule[6].conductor;
  } else if (S.conductorHistory) {
    const match = Object.entries(S.conductorHistory).find(([name, date]) => date === prevSundayStr);
    if (match) prevSunConductorBD = match[0];
  }
  if (prevSunConductorBD) {
    // v_0 is now in DOM after the loop above
    const mondayVip = document.getElementById('v_0');
    if (mondayVip && !mondayVip.value) {
      mondayVip.value = prevSunConductorBD;
      mondayVip.classList.add('af');
    }
  }
}

function makeNW(id, di, role) {
  const wrap = document.createElement('div'); wrap.className = 'name-wrap';
  const inp = document.createElement('input');
  inp.type = 'text'; inp.className = 'ni'; inp.id = id;
  inp.placeholder = role === 'conductor' ? '🚂 車掌' : '⭐ VIP';
  inp.autocomplete = 'off';
  const drop = document.createElement('div'); drop.className = 'dropdown'; drop.id = id+'_d';
  inp.addEventListener('input', () => { inp.classList.remove('af'); openD(id, drop, inp.value, di, role); });
  inp.addEventListener('focus', () => openD(id, drop, inp.value, di, role));
  inp.addEventListener('blur', () => setTimeout(() => drop.classList.remove('open'), 180));
  wrap.appendChild(inp); wrap.appendChild(drop);
  return wrap;
}

function openD(id, drop, q, di, role) {
  if (!S.members.length) { drop.innerHTML = '<div class="di" style="color:var(--text3)">連盟員未登録</div>'; drop.classList.add('open'); return; }
  const ql = q.trim().toLowerCase();
  const fil = S.members.filter(m => !ql || m.name.toLowerCase().includes(ql) || m.rank.toLowerCase().includes(ql));
  drop.innerHTML = fil.map(m =>
    `<div class="di" onmousedown="selN('${id}',${di},'${role}','${m.name.replace(/'/g,"\\'")}',event)">
      <span class="rank rank-${m.rank}">${m.rank}</span><span>${m.name}</span>
    </div>`
  ).join('');
  drop.classList.toggle('open', fil.length > 0 || !ql);
}

function selN(id, di, role, name, ev) {
  ev.preventDefault();
  const el = document.getElementById(id); el.value = name; el.classList.remove('af');
  document.getElementById(id+'_d').classList.remove('open');
  if (role === 'conductor') {
    // Always update next day's VIP (overwrite)
    if (di < 6) {
      const nv = document.getElementById('v_'+(di+1));
      if (nv) { nv.value = name; nv.classList.remove('af'); }
    }
    // If Sunday (di=6), update next week's Monday VIP if that week is open
    if (di === 6) {
      const mondayVip = document.getElementById('v_0');
      // Only update if same week context doesn't apply — handled by buildDayRows
    }
  }
}

function autoFill() {
  if (!S.members.length) { toast('連盟員を登録してください'); return; }
  const ws = document.getElementById('sched-week-start').value;
  if (!ws) { toast('開始日を選んでください'); return; }
  const lastDate = {};
  if (S.conductorHistory) Object.entries(S.conductorHistory).forEach(([n,d]) => lastDate[n] = d);
  const todayStr2 = todayISO();
  Object.entries(S.schedules).forEach(([wk, days]) => {
    days.forEach((d, i) => {
      if (d.conductor) {
        const dd = new Date(wk+'T00:00:00'); dd.setDate(dd.getDate()+i);
        const ds = iso(dd);
        // Only count past dates
        if (ds <= todayStr2 && (!lastDate[d.conductor] || ds > lastDate[d.conductor]))
          lastDate[d.conductor] = ds;
      }
    });
  });
  const now = new Date();
  // Filter out excluded members
  const eligible = S.members.filter(m => !S.excluded || !S.excluded[m.name]);
  const sorted = [...eligible].sort((a, b) => {
    const da = lastDate[a.name] ? Math.floor((now - new Date(lastDate[a.name]+'T00:00:00'))/86400000) : Infinity;
    const db = lastDate[b.name] ? Math.floor((now - new Date(lastDate[b.name]+'T00:00:00'))/86400000) : Infinity;
    return db - da;
  });
  // Get prev week's Sunday conductor for Monday VIP
  const ws2 = document.getElementById('sched-week-start').value;
  let prevSunConductor = '';
  if (ws2) {
    const mon2 = monOf(ws2);
    const prevSun2 = new Date(mon2); prevSun2.setDate(mon2.getDate()-1);
    const prevSunStr2 = iso(prevSun2);
    const prevKey = iso(weekMonOf(prevSunStr2));
    const prevSched = S.schedules[prevKey];
    if (prevSched && prevSched[6]?.conductor) {
      prevSunConductor = prevSched[6].conductor;
    } else if (S.conductorHistory) {
      // Fallback: check conductorHistory for prev Sunday
      const match = Object.entries(S.conductorHistory).find(([name, date]) => date === prevSunStr2);
      if (match) prevSunConductor = match[0];
    }
  }

  for (let i = 0; i < 7; i++) {
    const c = document.getElementById('c_'+i); const v = document.getElementById('v_'+i);
    if (c) { c.value = sorted[i]?.name||''; c.classList.add('af'); }
    if (v) {
      const vn = i===0 ? prevSunConductor : (sorted[i-1]?.name||'');
      v.value = vn; v.classList.toggle('af', !!vn);
    }
  }
  updateRotStatus();
  toast('自動入力完了 ✓ 間が空いている順に並べました');
}

function clearDayRows() {
  for (let i = 0; i < 7; i++) {
    const c = document.getElementById('c_'+i);
    const v = document.getElementById('v_'+i);
    if (c) { c.value = ''; c.classList.remove('af'); }
    if (v) { v.value = ''; v.classList.remove('af'); }
  }
  toast('クリアしました');
}

function updateRotStatus() {
  const area = document.getElementById('rot-status');
  if (!area || !S.members.length) { if(area) area.innerHTML=''; return; }
  const pos = S.rotPos % S.members.length;
  area.innerHTML = `<div class="rot-ind">🔄 <div>次の割り当て候補：<strong>${S.members[pos]?.name||'—'}</strong>（${pos+1}番目 / 全${S.members.length}名）</div></div>`;
}

function loadExistingSchedule() {
  const ws = document.getElementById('sched-week-start').value; if (!ws) return;
  const key = iso(monOf(ws));
  const existing = S.schedules[key]; if (!existing) return;
  existing.forEach((d, i) => {
    const c = document.getElementById('c_'+i); const v = document.getElementById('v_'+i);
    if (c && d.conductor) { c.value = d.conductor; c.classList.remove('af'); }
    if (v && d.vip) { v.value = d.vip; v.classList.remove('af'); }
  });
}

function saveSchedule() {
  const ws = document.getElementById('sched-week-start').value; if (!ws) return toast('開始日を選んでください');
  const mon = monOf(ws); const key = iso(mon);
  const days = []; let any = false;
  for (let i = 0; i < 7; i++) {
    const c = document.getElementById('c_'+i)?.value.trim()||'';
    const v = document.getElementById('v_'+i)?.value.trim()||'';
    const d = new Date(mon); d.setDate(mon.getDate()+i);
    days.push({ day: DAYS[i], date: fd(d), conductor: c, vip: v });
    if (c || v) any = true;
  }
  // Allow saving empty schedule (to clear a week)
  S.schedules[key] = days;
  S.previewIdx = Object.keys(S.schedules).sort().indexOf(key);
  save(); updateRotStatus(); toast('保存しました ✓');
  setTimeout(() => showPage('preview'), 400);
}

function delW(key) {

// ── admin ──
function setAdminFilter(r) {
  adminRankFilter = r;
  document.querySelectorAll('#admin-rank-filter .filter-btn').forEach(b => b.classList.toggle('active', b.dataset.rank===r));
  renderAdminList();
}

function getLastDate(name) {
  const todayStr = todayISO();
  let best = '';
  if (S.conductorHistory && S.conductorHistory[name]) best = S.conductorHistory[name];
  Object.entries(S.schedules).forEach(([wk, days]) => {
    days.forEach((d, i) => {
      if (d.conductor === name) {
        const dd = new Date(wk+'T00:00:00'); dd.setDate(dd.getDate()+i);
        const ds = iso(dd);
        // Only count dates that have already passed (today or earlier)
        if (ds <= todayStr && ds > best) best = ds;
      }
    });
  });
  return best;
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  return Math.floor((new Date() - new Date(dateStr+'T00:00:00')) / 86400000);
}

function renderAdminList() {
  const fil = adminRankFilter==='all' ? S.members : S.members.filter(m => m.rank===adminRankFilter);
  document.getElementById('admin-member-count').textContent = `(${S.members.length}名)`;
  const list = document.getElementById('admin-member-list');
  if (!fil.length) { list.innerHTML = '<div class="empty">該当なし</div>'; return; }
  list.innerHTML = '<div style="display:flex;flex-direction:column;gap:4px;margin-top:4px">' +
    fil.map(m => {
      const last = getLastDate(m.name);
      const days = daysSince(last);
      const daysLabel = days===null
        ? `<span style="color:var(--text3)">未設定</span>`
        : `<span style="color:${days>30?'var(--red)':days>14?'var(--amber)':'var(--green)'}">${days}日前</span>`;
      const lastLabel = last ? last.slice(5).replace('-','/') : '—';
            const isExcluded = S.excluded && S.excluded[m.name];
      return `<div style="background:${isExcluded?'var(--red-light)':'var(--gray1)'};border:1px solid ${isExcluded?'#f5c6c6':'var(--border)'};border-radius:var(--radius-sm);padding:8px 10px;display:flex;align-items:center;gap:6px;opacity:${isExcluded?'0.65':'1'}">
        <span style="flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isExcluded?'text-decoration:line-through;color:var(--text3)':''}">${m.name}</span>
        <span class="rank rank-${m.rank}">${m.rank}</span>
        <button onclick="toggleExclude('${m.name.replace(/'/g,"\'")}')"
          style="font-size:10px;border:1px solid ${isExcluded?'var(--red)':'var(--gray3)'};border-radius:var(--radius-sm);padding:2px 6px;background:${isExcluded?'var(--red-light)':'#fff'};cursor:pointer;color:${isExcluded?'var(--red)':'var(--text3)'};white-space:nowrap">
          ${isExcluded?'対象外✓':'対象外'}
        </button>
        <button onclick="editName('${m.name.replace(/'/g,"\'")}')"
          style="font-size:11px;border:1px solid var(--gray3);border-radius:var(--radius-sm);padding:3px 8px;background:#fff;cursor:pointer;color:var(--text2);white-space:nowrap">
          ✏️名前
        </button>
        <button onclick="editLastDate('${m.name.replace(/'/g,"\'")}')"
          style="font-size:11px;border:1px solid var(--gray3);border-radius:var(--radius-sm);padding:3px 8px;background:#fff;cursor:pointer;color:var(--text2);white-space:nowrap">
          ${lastLabel} 📅
        </button>
        ${daysLabel}
        <button onclick="delM('${m.name.replace(/'/g,"\'")}')" style="background:none;border:none;color:var(--gray4);cursor:pointer;font-size:16px;padding:0 2px">×</button>
      </div>`;
    }).join('') + '</div>';
}

function toggleExclude(name) {
  if (!S.excluded) S.excluded = {};
  S.excluded[name] = !S.excluded[name];
  if (!S.excluded[name]) delete S.excluded[name];
  save();
  renderAdminList();
  toast(`${name} を${S.excluded&&S.excluded[name]?'対象外':'対象'}にしました`);
}

function editName(oldName) {
  const newName = prompt(`名前を変更：`, oldName);
  if (!newName || newName === oldName) return;
  if (S.members.find(m => m.name === newName)) { toast('その名前は既に登録済みです'); return; }
  // Update members list
  const m = S.members.find(m => m.name === oldName);
  if (m) m.name = newName;
  // Update conductorHistory
  if (S.conductorHistory && S.conductorHistory[oldName] !== undefined) {
    S.conductorHistory[newName] = S.conductorHistory[oldName];
    delete S.conductorHistory[oldName];
  }
  // Update excluded
  if (S.excluded && S.excluded[oldName] !== undefined) {
    S.excluded[newName] = S.excluded[oldName];
    delete S.excluded[oldName];
  }
  // Update schedules
  Object.values(S.schedules).forEach(days => {
    days.forEach(d => {
      if (d.conductor === oldName) d.conductor = newName;
      if (d.vip === oldName) d.vip = newName;
    });
  });
  save();
  renderAdminList();
  toast(`${oldName} → ${newName} に変更しました`);
}

function editLastDate(name) {
  if (editingName === name) { closeEdit(); return; }
  editingName = name;
  renderAdminList();
  const last = getLastDate(name);
  const editDiv = document.createElement('div');
  editDiv.id = 'edit-date-row';
  editDiv.style.cssText = 'background:var(--green-light);border:1px solid var(--green-mid);border-radius:var(--radius-sm);padding:10px 12px;margin-top:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap';
  editDiv.innerHTML = `
    <span style="font-size:13px;font-weight:600;flex:1">${name}</span>
    <input type="date" id="edit-date-inp" value="${last||''}" style="width:150px;font-size:13px">
    <button class="btn btn-primary btn-sm" onclick="saveLastDate('${name.replace(/'/g,"\\'")}')">保存</button>
    <button class="btn btn-danger btn-sm" onclick="clearLastDate('${name.replace(/'/g,"\\'")}')">日付を削除</button>
    <button class="btn btn-secondary btn-sm" onclick="closeEdit()">閉じる</button>
  `;
  document.getElementById('admin-member-list').appendChild(editDiv);
  document.getElementById('edit-date-inp').focus();
}

function clearLastDate(name) {
  if (!confirm(`「${name}」の前回任命日を削除しますか？`)) return;
  if (S.conductorHistory) delete S.conductorHistory[name];
  save(); editingName = null; renderAdminList();
  toast(`${name} の前回任命日を削除しました`);
}

function saveLastDate(name) {
  const val = document.getElementById('edit-date-inp')?.value;
  if (!val) { toast('日付を選んでください'); return; }
  if (!S.conductorHistory) S.conductorHistory = {};
  S.conductorHistory[name] = val;
  save(); editingName = null; renderAdminList();
  toast(`${name} の前回任命日を更新しました`);
}

function closeEdit() {
  editingName = null;
  const el = document.getElementById('edit-date-row'); if (el) el.remove();
}

function sortMembersByRank() {
  S.members.sort((a, b) => {
    const ra = RANK_ORDER[a.rank] ?? 9;
    const rb = RANK_ORDER[b.rank] ?? 9;
    if (ra !== rb) return ra - rb;
    return a.name.localeCompare(b.name, 'ja');
  });
  S.rotPos = 0;
  save(); renderAdminList(); updateRotStatus();
  toast('ランク順に並べ替えました');
}

function delM(name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  const idx = S.members.findIndex(m => m.name===name);
  if (idx < S.rotPos && S.rotPos > 0) S.rotPos = Math.max(0, S.rotPos-1);
  S.members = S.members.filter(m => m.name!==name);
  if (S.conductorHistory) delete S.conductorHistory[name];
  save(); renderAdminList(); updateRotStatus();
}

function addOne() {
  const name = document.getElementById('add-name').value.trim();
  const rank = document.getElementById('add-rank').value;
  if (!name) return;
  if (S.members.find(m => m.name===name)) { toast('既に登録済みです'); return; }
  S.members.push({ name, rank }); save();
  document.getElementById('add-name').value = '';
  renderAdminList(); updateRotStatus();
  toast(`${name} を追加しました`);
}

function zenToHan(s) { return s.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0)-0xFEE0)); }

// unmatched items pending manual link: [{dateStr, memoName}]
let unmatchedItems = [];
let pendingFuture = [];

function importMemo() {
  const raw = document.getElementById('memo-input').value.trim();
  if (!raw) return toast('メモを貼り付けてください');
  const lines = raw.split(/[\n\r]+/);
  const fallbackMonth = parseInt(document.getElementById('memo-fallback-month')?.value||'0')||null;
  let currentMonth = fallbackMonth;
  const now = new Date(); const currentYear = now.getFullYear();
  const imported = []; const notFound = []; const future = [];
  unmatchedItems = [];

  for (let line of lines) {
    line = line.trim(); if (!line) continue;
    const lh = zenToHan(line);
    const mh = lh.match(/^(\d+)月/);
    if (mh && /[月度車掌]/.test(line)) { currentMonth = parseInt(mh[1]); continue; }
    const md = lh.match(/^(\d+)日[\s\u3000]+(.+)/);
    if (md && currentMonth !== null) {
      const day = parseInt(md[1]); const name = md[2].trim();
      let year = currentYear;
      const dateStrCheck = `${year}-${String(currentMonth).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      // Reject future dates first (before any year adjustment)
      if (new Date(dateStrCheck + 'T00:00:00') > now) {
        future.push(`${currentMonth}/${day} ${name}`);
        continue;
      }
      // If past, use current year as-is (already confirmed not future)
      const dateStr = dateStrCheck;
      const member = S.members.find(m => m.name===name)
        || S.members.find(m => m.name.includes(name)||name.includes(m.name));
      if (member) {
        if (!S.conductorHistory) S.conductorHistory = {};
        if (!S.conductorHistory[member.name] || dateStr > S.conductorHistory[member.name])
          S.conductorHistory[member.name] = dateStr;
        imported.push(`${currentMonth}/${day} ${member.name}`);
      } else {
        unmatchedItems.push({ dateStr, memoName: name, label: `${currentMonth}/${day} ${name}` });
      }
    }
  }

  pendingFuture = future;
  save();
  renderMemoResult(imported);
  if (imported.length) { toast(`${imported.length}件インポート完了`); renderAdminList(); }
}

function renderMemoResult(imported) {
  const future = pendingFuture;
  const res = document.getElementById('memo-result');
  let html = '';
  if (imported && imported.length)
    html += `<div style="color:var(--green-dark);margin-bottom:8px">✓ ${imported.length}件をインポートしました</div>`;
  if (future && future.length)
    html += `<div style="background:var(--red-light);border:1px solid #f5c6c6;border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;font-size:12px">
      <div style="font-weight:600;color:var(--red);margin-bottom:4px">⚠️ 未来の日付のため取り込みできませんでした（${future.length}件）</div>
      <div style="color:var(--red);margin-bottom:6px">${future.join('、')}</div>
      <div style="color:var(--text2)">📅 予定はスケジュールタブから入力してください。このタブは過去の実績のみ受け付けます。</div>
    </div>`;
  if (unmatchedItems.length) {
    const opts = S.members.map(m => `<option value="${m.name}">${m.name}（${m.rank}）</option>`).join('');
    html += `<div style="color:var(--amber);font-size:12px;font-weight:600;margin-bottom:6px">⚠ 一致しなかった ${unmatchedItems.length}件 — 正式名を選んでください</div>`;
    html += `<div id="unmatched-list">` + unmatchedItems.map((item, idx) => `
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text2);min-width:90px">${item.label}</span>
        <span style="font-size:11px;color:var(--text3)">→</span>
        <select id="unmatched-sel-${idx}" style="flex:1;min-width:130px;font-size:12px;padding:5px 8px">
          <option value="">（スキップ）</option>
          ${opts}
        </select>
      </div>`).join('') + `</div>`;
    html += `<button class="btn btn-primary" style="margin-top:8px;width:100%" onclick="linkAllUnmatched()">✓ すべて確定</button>`;
  }
  res.innerHTML = html;
}

function linkAllUnmatched() {
  // collect all current selections
  const toProcess = unmatchedItems.map((item, idx) => {
    const sel = document.getElementById(`unmatched-sel-${idx}`);
    return { item, memberName: sel ? sel.value : '' };
  });
  let count = 0;
  toProcess.forEach(({ item, memberName }) => {
    if (!memberName) return;
    if (!S.conductorHistory) S.conductorHistory = {};
    if (!S.conductorHistory[memberName] || item.dateStr > S.conductorHistory[memberName])
      S.conductorHistory[memberName] = item.dateStr;
    count++;
  });
  save();
  unmatchedItems = unmatchedItems.filter((_, idx) => !toProcess[idx].memberName);
  renderMemoResult(null);
  renderAdminList();
  if (count) toast(`${count}件を一括で紐付けました`);
}

// ── init ──
document.addEventListener('DOMContentLoaded', function() {
  // Default: if Sunday → this week's Monday, else → next Monday
  const todayD = new Date(todayISO()+'T00:00:00');
  const isSunday = todayD.getDay() === 0;
  const thisM = monOf(todayISO());
  const defaultM = isSunday ? thisM : new Date(thisM.getFullYear(), thisM.getMonth(), thisM.getDate()+7);
  document.getElementById('sched-week-start').value = iso(defaultM);
  buildDayRows();
  loadExistingSchedule();
  renderAdminList();
  renderHistory();
  renderPreview();
  updateRotStatus();
  // Sync from GAS on load
  syncFromGAS();

  syncFromGAS();

  document.getElementById('sched-week-start').addEventListener('change', () => {
    buildDayRows();
    updateRotStatus();
    loadExistingSchedule();
  });
});
</script>

let helpOpen = false;

function toggleHelp(ev) {
  ev.stopPropagation();
  if (helpOpen) { closeHelp(); return; }
  // find active page
  const active = document.querySelector('.page.active');
  const pageId = active ? active.id.replace('page-','') : 'schedule';
  const bubble = document.getElementById('help-bubble');
  bubble.innerHTML = HELP_CONTENT[pageId] || '';
  document.getElementById('help-overlay').classList.add('open');
  helpOpen = true;
}

function closeHelp(ev) {
  // close if clicking overlay (not bubble)
  if (ev && ev.target === document.getElementById('help-bubble')) return;
  document.getElementById('help-overlay').classList.remove('open');
  helpOpen = false;
}

// close on any tab change or scroll
document.addEventListener('scroll', () => { if(helpOpen) closeHelp(); }, true);
</script>
